<div class="modal">
  <mat-dialog-content class="content">
    <h2 class="title">Are you sure?</h2>
    <span class="subtitle">{{ message }}</span>
  </mat-dialog-content>
  <mat-dialog-actions class="actions">
    <button mat-button class="cancel-btn" (click)="onCancel()">Cancel</button>
    <button mat-raised-button class="submit-btn" (click)="onConfirm()">Confirm</button>
  </mat-dialog-actions>
</div>
