<div class="stats-section">
  <h3>Team {{ data.name }} Stats</h3>
  @for (s of data.stats; track s) {
  <div class="stat-row">
    <span class="label">{{ s.name }}</span>
    <div class="bar-container">
      <div class="bar" [style.width.%]="animateBars() ? (s.value / 1000) * 100 : 0"></div>
      <span class="value">{{ s.value }}</span>
    </div>
  </div>
  }
</div>
