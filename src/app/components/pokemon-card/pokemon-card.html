<mat-card class="pokemon-card" (click)="showDetails(pokemon())">
  <mat-card-header class="header">
    <mat-card-title class="title">
      <span>
        {{ pokemon().name | titlecase }}
      </span>

    </mat-card-title>
    <span class="id">
      #{{ pokemon().id}}
    </span>
  </mat-card-header>
  <img matCardImage src="{{ pokemon().imageUrl }}" alt="{{ pokemon().name }}">

</mat-card>
