<div class="card-container">
  <div class="header">
    <span class="title">
      {{ team().name }}

    </span>
    <div class="actions">
      <button class="favorite-team-btn btn" (click)="toggleFavorite()" [class]="{'favorited': team().isFavorite}">
        @if (team().isFavorite) {
          <mat-icon class="favorite-icon">favorite</mat-icon>
        } @else {
          <mat-icon class="favorite-icon">favorite_outline</mat-icon>
        }
      </button>
      <button class="stats-team-btn btn" (click)="showStats(team())">
        <mat-icon>bar_chart</mat-icon>
      </button>
      <button class="toggle-edit-btn btn" (click)="toggleEditMode()" [class]="{ 'editing': isEditing() }">
        <mat-icon>edit</mat-icon>
      </button>
      <button class="remove-team-btn btn" (click)="deleteTeam(team().id)">
        <mat-icon>delete_outline</mat-icon>
      </button>
    </div>
  </div>
  <div class="team">
    @for(pokemon of pokemons(); track $index) {
    <div class="pokemon" >
      @if (isEditing()) {
        <button class="remove-pkm-btn" (click)="removePokemon(pokemon.id)">
          <mat-icon>close</mat-icon>
        </button>
      }
      <img [src]="pokemon.gifUrl" alt="{{ pokemon.name }}" />
    </div>
    }
  </div>
</div>
