<div class="card-container">
  <div class="header">
    <span class="title">
      {{ team().name }}

    </span>
  </div>
  <div class="team">
    @for(pokemon of pokemons(); track $index) {
      <div class="pokemon">
        <img [src]="pokemon.gifUrl" alt="{{ pokemon.name }}" />
      </div>
    }
  </div>
</div>
